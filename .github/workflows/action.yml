name: Build and Upload Resumes

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to run this manually for testing

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Build the Typst Documents
      - name: Build Resumes (Typst)
        uses: lvignoli/typst-action@main
        with:
          source_file: |
            resume.typst
            resume_ai.typst
            resume_backend.typst

      # 2. Store as GitHub Artifacts (Good for backup)
      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Resumes
          path: "*.pdf"

      # 3. Setup Python Environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python Dependencies
        run: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt

      # 4. Run the Upload Script
      - name: Upload PDFs to Google Drive
        env:
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET : ${{ secrets.CLIENT_SECRET }}
        run: python main.py